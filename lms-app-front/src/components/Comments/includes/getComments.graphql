query getComments(
    $subjectContentType: String!,
    $subjectContentTypeId: String!
    $pagination: PaginationArg = {},
) {
    comments(
        filters: {
            subjectContentTypeId: { eq: $subjectContentTypeId},
            subjectContentType: { eq: $subjectContentType },
            isDeleted: { eq: false }
        }
        pagination: $pagination
        sort: ["id:DESC"]
    ) {
        meta {
            pagination {
                pageSize
                page
                pageCount
                total
            }
        }
        data {
            id
            attributes {
                text
                attaches
                createdAt
                updatedAt
                subjectContentType
                subjectContentTypeId
                authorUser {
                    data {
                        id
                        attributes {
                            ...CommentAuthor
                        }
                    }
                }
            }
        }
    }
}
