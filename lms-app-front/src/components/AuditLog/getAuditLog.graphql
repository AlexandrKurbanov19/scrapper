fragment AuditLogAuthor on UsersPermissionsUser {
    administrator {
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                email
                avatarUrl
            }
        }
    }
    tutor {
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                email
                avatarUrl
            }
        }
    }
    teacher {
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                email
                avatarUrl
            }
        }
    }
    student {
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                email
                avatarUrl
            }
        }
    }
    parent {
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                email
                avatarUrl
            }
        }
    }
    curator {
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                email
                avatarUrl
            }
        }
    }
}

query getAuditLog($filters: AuditLogFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    auditLogs(filters: $filters, pagination: $pagination, sort: $sort) {
        data {
            id
            attributes {
                action
                createdAt
                contentType
                entityId
                params
                result
                updatedAt
                userAuthor {
                    data {
                        id
                        attributes {
                            ...AuditLogAuthor
                        }
                    }
                }
            }
        }
    }
}
