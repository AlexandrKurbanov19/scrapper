query getParentsToSelector($filters: ParentFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    parents(filters: $filters, pagination: $pagination, sort: $sort) {
        meta {
            pagination {
                pageSize
                page
                pageCount
                total
            }
        }
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                avatarUrl
            }
        }
    }
}
