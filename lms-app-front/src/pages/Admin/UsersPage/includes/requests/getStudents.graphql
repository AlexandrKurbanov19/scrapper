query getStudents($filters: StudentFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    students(filters: $filters, pagination: $pagination, sort: $sort) {
        meta {
            pagination {
                pageSize
                page
                pageCount
                total
            }
        }
        data {
            id
            attributes {
                user {
                    data {
                        id
                        attributes {
                            blocked
                            email
                        }
                    }
                }
                firstname
                lastname
                patronymic
                email
                phone
                telegram
                vk
                avatarUrl
                birthday
                parents {
                    data {
                        id
                        attributes {
                            avatarUrl
                            firstname
                            lastname
                            patronymic
                        }
                    }
                }
                tariff {
                    data {
                        id
                        attributes {
                            name
                        }
                    }
                }
            }
        }
    }
}
