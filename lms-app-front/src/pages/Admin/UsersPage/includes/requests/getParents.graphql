query getParents($filters: ParentFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    parents(filters: $filters, pagination: $pagination, sort: $sort) {
        meta {
            pagination {
                pageSize
                page
                pageCount
                total
            }
        }
        data {
            id
            attributes {
                user {
                    data {
                        id
                        attributes {
                            blocked
                            email
                        }
                    }
                }
                firstname
                lastname
                patronymic
                email
                phone
                telegram
                vk
                avatarUrl
                children {
                    data {
                        id
                        attributes {
                            firstname
                            lastname
                            patronymic
                            email
                            phone
                            telegram
                            vk
                            avatarUrl
                        }
                    }
                }
            }
        }
    }
}
