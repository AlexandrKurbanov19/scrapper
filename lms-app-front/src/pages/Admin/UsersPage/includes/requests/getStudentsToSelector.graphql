query getStudentsToSelector($filters: StudentFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    students(filters: $filters, pagination: $pagination, sort: $sort) {
        meta {
            pagination {
                pageSize
                page
                pageCount
                total
            }
        }
        data {
            id
            attributes {
                firstname
                lastname
                patronymic
                avatarUrl
            }
        }
    }
}
