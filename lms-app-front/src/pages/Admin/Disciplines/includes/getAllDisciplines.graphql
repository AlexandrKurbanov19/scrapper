query getAllDisciplines($filters: DisciplineFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    disciplines(filters: $filters, pagination: $pagination, sort: $sort) {
        meta {
            pagination {
                page
                pageCount
                pageSize
                total
            }
        }
        data {
            id
            attributes {
                title
            }
        }
    }
}
