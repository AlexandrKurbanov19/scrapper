query getLessonById($id: ID!) {
    lesson(id: $id) {
        data {
            id
            attributes {
                title
                module {
                    data {
                        id
                    }
                }
                theme {
                    data {
                        id
                    }
                }
                goalText
                intoLeftContent
                intoRightContent
                theoryContent
                outroContent
                numberOfTestAttemptsForLesson
                testSpoilerText
                nextLessonSpoiler
                lessonTest {
                    data {
                        id
                        attributes {
                            questions
                            rightAnswers
                        }
                    }
                }
                lessonPracticalTask {
                    data {
                        id
                        attributes {
                            questions
                            rightAnswers
                            deadlineDaysAfterFinishTest
                        }
                    }
                }
                lessonKnowledgeConsolidationTask {
                    data {
                        id
                        attributes {
                            questions
                            rightAnswers
                        }
                    }
                }
            }
        }
    }
}
