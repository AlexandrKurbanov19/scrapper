query getAllLessons($filters: LessonFiltersInput, $pagination: PaginationArg = {}, $sort: [String] = []) {
    lessons(filters: $filters, pagination: $pagination, sort: $sort) {
        meta {
            pagination {
                page
                pageCount
                pageSize
                total
            }
        }
        data {
            id
            attributes {
                title
                theme {
                    data {
                        id
                        attributes {
                            title
                        }
                    }
                }
                module {
                    data {
                        id
                        attributes {
                            age
                            title
                            discipline {
                                data {
                                    id
                                    attributes {
                                        title
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}
